name: Gerar palpites da IA

on:
  workflow_dispatch:
    inputs:
      match:
        description: "Jogo especifico, por exemplo D-3. Opcional."
        required: false
        type: string
      force:
        description: "Sobrescrever palpite existente da IA"
        required: false
        default: false
        type: boolean
  schedule:
    # 06:00-23:00 em Sao Paulo, cobrindo jogos do dia sem sobrescrever palpites existentes.
    - cron: "0 9-23 * * *"
    # Reforco para jogos da madrugada que pertencem ao dia operacional anterior.
    - cron: "0 0-5 * * *"

concurrency:
  group: ai-predictions
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Gerar palpites do Gemini
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY ausente. Cadastre o secret antes de gerar palpites da IA."
            exit 1
          fi

          args=()
          if [ -n "${{ inputs.match }}" ]; then
            args+=(--match "${{ inputs.match }}")
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          npm run ai:predictions -- "${args[@]}"
