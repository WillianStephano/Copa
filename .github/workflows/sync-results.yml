name: Sincronizar resultados do bolão

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Atualizar jogos e ranking
        shell: bash
        run: |
          for attempt in 1 2 3; do
            node scripts/sync-results.mjs && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "Sincronização falhou. Nova tentativa em 30 segundos..."
              sleep 30
            fi
          done
          exit 1
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
